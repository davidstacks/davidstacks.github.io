<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity Sandbox - Physics Playground</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        #toolbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            z-index: 100;
            border-bottom: 2px solid #0f3460;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        #toolbar h1 {
            font-size: 1.3rem;
            background: linear-gradient(90deg, #e94560, #f5a623, #50fa7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 20px;
            letter-spacing: 1px;
        }

        .tool-btn {
            padding: 8px 16px;
            border: 2px solid #0f3460;
            background: #16213e;
            color: #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            font-weight: 600;
        }

        .tool-btn:hover {
            border-color: #e94560;
            background: #1a1a3e;
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.3);
        }

        .tool-btn.active {
            border-color: #e94560;
            background: #e94560;
            color: white;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.4);
        }

        .separator {
            width: 2px;
            height: 30px;
            background: #0f3460;
        }

        #canvas {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            bottom: 0;
            cursor: crosshair;
        }

        #stats {
            position: fixed;
            bottom: 15px;
            left: 15px;
            background: rgba(26, 26, 46, 0.9);
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.8rem;
            border: 1px solid #0f3460;
            line-height: 1.8;
            z-index: 50;
        }

        #stats span {
            color: #e94560;
            font-weight: bold;
        }

        #instructions {
            position: fixed;
            bottom: 15px;
            right: 15px;
            background: rgba(26, 26, 46, 0.9);
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.75rem;
            border: 1px solid #0f3460;
            line-height: 1.8;
            z-index: 50;
            max-width: 280px;
        }

        #instructions strong {
            color: #50fa7b;
        }

        #gravity-slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #gravity-slider-container label {
            font-size: 0.8rem;
            color: #aaa;
        }

        #gravity-slider {
            width: 100px;
            accent-color: #e94560;
            cursor: pointer;
        }

        #gravity-val {
            font-size: 0.8rem;
            color: #e94560;
            min-width: 30px;
        }

        #size-slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #size-slider-container label {
            font-size: 0.8rem;
            color: #aaa;
        }

        #size-slider {
            width: 80px;
            accent-color: #f5a623;
            cursor: pointer;
        }

        #size-val {
            font-size: 0.8rem;
            color: #f5a623;
            min-width: 20px;
        }

        .trail-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #aaa;
            cursor: pointer;
        }

        .trail-toggle input {
            accent-color: #50fa7b;
            cursor: pointer;
        }

        @keyframes spawn {
            0% { transform: scale(0); opacity: 0; }
            50% { transform: scale(1.3); }
            100% { transform: scale(1); opacity: 1; }
        }

        #explosion-counter {
            position: fixed;
            top: 80px;
            right: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 50;
            text-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        #explosion-counter.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="toolbar">
        <h1>GRAVITY SANDBOX</h1>
        <button class="tool-btn active" id="btn-spawn" onclick="setTool('spawn')">Spawn Ball</button>
        <button class="tool-btn" id="btn-attract" onclick="setTool('attract')">Black Hole</button>
        <button class="tool-btn" id="btn-repel" onclick="setTool('repel')">Repulsor</button>
        <button class="tool-btn" id="btn-wall" onclick="setTool('wall')">Draw Wall</button>
        <div class="separator"></div>
        <div id="gravity-slider-container">
            <label>Gravity:</label>
            <input type="range" id="gravity-slider" min="0" max="200" value="50">
            <span id="gravity-val">0.5</span>
        </div>
        <div id="size-slider-container">
            <label>Size:</label>
            <input type="range" id="size-slider" min="3" max="40" value="10">
            <span id="size-val">10</span>
        </div>
        <label class="trail-toggle">
            <input type="checkbox" id="trail-check" checked> Trails
        </label>
        <div class="separator"></div>
        <button class="tool-btn" onclick="explodeAll()" style="border-color: #f5a623; color: #f5a623;">Explode!</button>
        <button class="tool-btn" onclick="freezeAll()">Freeze</button>
        <button class="tool-btn" onclick="clearAll()" style="border-color: #ff4444; color: #ff4444;">Clear</button>
    </div>

    <canvas id="canvas"></canvas>

    <div id="stats">
        Balls: <span id="ball-count">0</span><br>
        FPS: <span id="fps-display">60</span><br>
        Collisions: <span id="collision-count">0</span>
    </div>

    <div id="instructions">
        <strong>Click</strong> to spawn or use tools<br>
        <strong>Click + Drag</strong> to launch with velocity<br>
        <strong>Black Hole</strong> pulls balls toward cursor<br>
        <strong>Repulsor</strong> pushes balls away<br>
        <strong>Draw Wall</strong> creates solid barriers<br>
        <strong>Explode!</strong> to burst all balls apart
    </div>

    <div id="explosion-counter">BOOM!</div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let W, H;
        let balls = [];
        let walls = [];
        let currentTool = 'spawn';
        let gravity = 0.5;
        let ballSize = 10;
        let showTrails = true;
        let mouseDown = false;
        let mouseX = 0, mouseY = 0;
        let dragStartX = 0, dragStartY = 0;
        let isDragging = false;
        let collisionCount = 0;
        let frameCount = 0;
        let lastFpsTime = performance.now();
        let currentFps = 60;
        let drawingWall = false;
        let wallPoints = [];
        let frozen = false;

        const colors = [
            '#e94560', '#f5a623', '#50fa7b', '#6272a4',
            '#ff79c6', '#8be9fd', '#bd93f9', '#ffb86c',
            '#ff5555', '#f1fa8c', '#00d2ff', '#ff6b6b',
            '#c56cf0', '#18dcff', '#7bed9f', '#ffa502'
        ];

        function resize() {
            W = canvas.width = window.innerWidth;
            H = canvas.height = window.innerHeight - 60;
        }
        resize();
        window.addEventListener('resize', resize);

        class Ball {
            constructor(x, y, vx, vy, r) {
                this.x = x;
                this.y = y;
                this.vx = vx || (Math.random() - 0.5) * 4;
                this.vy = vy || (Math.random() - 0.5) * 4;
                this.r = r || ballSize;
                this.mass = this.r * this.r;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.trail = [];
                this.maxTrail = 20;
                this.life = 1;
                this.born = performance.now();
                this.glowIntensity = 1;
            }

            update() {
                if (frozen) return;

                this.vy += gravity * 0.1;

                this.vx *= 0.999;
                this.vy *= 0.999;

                if (showTrails) {
                    this.trail.push({ x: this.x, y: this.y });
                    if (this.trail.length > this.maxTrail) {
                        this.trail.shift();
                    }
                }

                this.x += this.vx;
                this.y += this.vy;

                // Wall collisions
                if (this.x - this.r < 0) {
                    this.x = this.r;
                    this.vx *= -0.8;
                    collisionCount++;
                }
                if (this.x + this.r > W) {
                    this.x = W - this.r;
                    this.vx *= -0.8;
                    collisionCount++;
                }
                if (this.y - this.r < 0) {
                    this.y = this.r;
                    this.vy *= -0.8;
                    collisionCount++;
                }
                if (this.y + this.r > H) {
                    this.y = H - this.r;
                    this.vy *= -0.8;
                    collisionCount++;

                    // Friction on ground
                    this.vx *= 0.98;
                }

                // Wall segment collisions
                for (let w of walls) {
                    for (let i = 0; i < w.length - 1; i++) {
                        this.collideWithSegment(w[i], w[i + 1]);
                    }
                }

                this.glowIntensity = Math.min(1, 0.3 + Math.sqrt(this.vx * this.vx + this.vy * this.vy) * 0.1);
            }

            collideWithSegment(p1, p2) {
                let dx = p2.x - p1.x;
                let dy = p2.y - p1.y;
                let len = Math.sqrt(dx * dx + dy * dy);
                if (len === 0) return;

                let nx = -dy / len;
                let ny = dx / len;

                let apx = this.x - p1.x;
                let apy = this.y - p1.y;

                let dist = apx * nx + apy * ny;

                if (Math.abs(dist) < this.r) {
                    let t = (apx * dx + apy * dy) / (len * len);
                    if (t >= 0 && t <= 1) {
                        let dot = this.vx * nx + this.vy * ny;
                        this.vx -= 1.6 * dot * nx;
                        this.vy -= 1.6 * dot * ny;

                        let overlap = this.r - Math.abs(dist);
                        let sign = dist > 0 ? 1 : -1;
                        this.x += nx * overlap * sign;
                        this.y += ny * overlap * sign;
                        collisionCount++;
                    }
                }
            }

            draw() {
                // Trail
                if (showTrails && this.trail.length > 1) {
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.strokeStyle = this.color + '40';
                    ctx.lineWidth = this.r * 0.6;
                    ctx.lineCap = 'round';
                    ctx.stroke();
                }

                // Glow
                let glow = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 3);
                glow.addColorStop(0, this.color + Math.floor(this.glowIntensity * 40).toString(16).padStart(2, '0'));
                glow.addColorStop(1, this.color + '00');
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r * 3, 0, Math.PI * 2);
                ctx.fill();

                // Ball body
                let grad = ctx.createRadialGradient(
                    this.x - this.r * 0.3, this.y - this.r * 0.3, this.r * 0.1,
                    this.x, this.y, this.r
                );
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.3, this.color);
                grad.addColorStop(1, this.darken(this.color, 0.4));

                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();

                // Highlight
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.arc(this.x - this.r * 0.25, this.y - this.r * 0.25, this.r * 0.35, 0, Math.PI * 2);
                ctx.fill();
            }

            darken(hex, factor) {
                let r = parseInt(hex.slice(1, 3), 16);
                let g = parseInt(hex.slice(3, 5), 16);
                let b = parseInt(hex.slice(5, 7), 16);
                r = Math.floor(r * factor);
                g = Math.floor(g * factor);
                b = Math.floor(b * factor);
                return `rgb(${r},${g},${b})`;
            }
        }

        function ballCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let a = balls[i];
                    let b = balls[j];
                    let dx = b.x - a.x;
                    let dy = b.y - a.y;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let minDist = a.r + b.r;

                    if (dist < minDist && dist > 0) {
                        collisionCount++;

                        let nx = dx / dist;
                        let ny = dy / dist;

                        let overlap = minDist - dist;
                        let totalMass = a.mass + b.mass;
                        a.x -= nx * overlap * (b.mass / totalMass);
                        a.y -= ny * overlap * (b.mass / totalMass);
                        b.x += nx * overlap * (a.mass / totalMass);
                        b.y += ny * overlap * (a.mass / totalMass);

                        let dvx = a.vx - b.vx;
                        let dvy = a.vy - b.vy;
                        let dvn = dvx * nx + dvy * ny;

                        if (dvn > 0) {
                            let restitution = 0.85;
                            let impulse = (1 + restitution) * dvn / totalMass;
                            a.vx -= impulse * b.mass * nx;
                            a.vy -= impulse * b.mass * ny;
                            b.vx += impulse * a.mass * nx;
                            b.vy += impulse * a.mass * ny;
                        }
                    }
                }
            }
        }

        function applyForceField(type) {
            if (!mouseDown) return;
            let strength = type === 'attract' ? 0.5 : -0.8;

            for (let ball of balls) {
                let dx = mouseX - ball.x;
                let dy = mouseY - ball.y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 5) dist = 5;
                if (dist > 400) continue;

                let force = strength * ball.mass / (dist * 0.5);
                ball.vx += (dx / dist) * force;
                ball.vy += (dy / dist) * force;
            }
        }

        function drawForceField() {
            if (!mouseDown) return;
            if (currentTool !== 'attract' && currentTool !== 'repel') return;

            let isAttract = currentTool === 'attract';
            let rings = 5;

            for (let i = rings; i >= 1; i--) {
                let r = i * 30 + Math.sin(performance.now() * 0.005 * (isAttract ? 1 : -1) + i) * 10;
                ctx.beginPath();
                ctx.arc(mouseX, mouseY, r, 0, Math.PI * 2);
                ctx.strokeStyle = isAttract
                    ? `rgba(100, 0, 255, ${0.3 / i})`
                    : `rgba(255, 100, 0, ${0.3 / i})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Center glow
            let grad = ctx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 60);
            if (isAttract) {
                grad.addColorStop(0, 'rgba(100, 0, 255, 0.4)');
                grad.addColorStop(0.5, 'rgba(50, 0, 150, 0.1)');
                grad.addColorStop(1, 'transparent');
            } else {
                grad.addColorStop(0, 'rgba(255, 150, 0, 0.4)');
                grad.addColorStop(0.5, 'rgba(255, 50, 0, 0.1)');
                grad.addColorStop(1, 'transparent');
            }
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 60, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawDragLine() {
            if (!isDragging || currentTool !== 'spawn') return;

            let dx = dragStartX - mouseX;
            let dy = dragStartY - mouseY;

            // Arrow line
            ctx.beginPath();
            ctx.moveTo(dragStartX, dragStartY);
            ctx.lineTo(mouseX, mouseY);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Preview ball
            ctx.beginPath();
            ctx.arc(dragStartX, dragStartY, ballSize, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Velocity indicator
            let speed = Math.sqrt(dx * dx + dy * dy) * 0.1;
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '12px monospace';
            ctx.fillText(`v: ${speed.toFixed(1)}`, dragStartX + 15, dragStartY - 15);
        }

        function drawWalls() {
            ctx.lineWidth = 4;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            for (let w of walls) {
                if (w.length < 2) continue;
                ctx.beginPath();
                ctx.moveTo(w[0].x, w[0].y);
                for (let i = 1; i < w.length; i++) {
                    ctx.lineTo(w[i].x, w[i].y);
                }
                ctx.strokeStyle = '#50fa7b';
                ctx.shadowColor = '#50fa7b';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Current drawing
            if (drawingWall && wallPoints.length > 0) {
                ctx.beginPath();
                ctx.moveTo(wallPoints[0].x, wallPoints[0].y);
                for (let i = 1; i < wallPoints.length; i++) {
                    ctx.lineTo(wallPoints[i].x, wallPoints[i].y);
                }
                ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = '#50fa7b88';
                ctx.stroke();
            }
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 1;
            let gridSize = 50;
            for (let x = 0; x < W; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, H);
                ctx.stroke();
            }
            for (let y = 0; y < H; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }
        }

        let particles = [];

        class Particle {
            constructor(x, y, vx, vy, color) {
                this.x = x;
                this.y = y;
                this.vx = vx;
                this.vy = vy;
                this.color = color;
                this.life = 1;
                this.decay = 0.02 + Math.random() * 0.03;
                this.r = 2 + Math.random() * 3;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += gravity * 0.05;
                this.life -= this.decay;
                this.r *= 0.98;
            }

            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        function spawnExplosionParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 2 + Math.random() * 6;
                particles.push(new Particle(
                    x, y,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    color
                ));
            }
        }

        function explodeAll() {
            let el = document.getElementById('explosion-counter');
            el.classList.add('show');
            el.textContent = 'BOOM! x' + balls.length;
            setTimeout(() => el.classList.remove('show'), 1500);

            for (let ball of balls) {
                let angle = Math.random() * Math.PI * 2;
                let force = 10 + Math.random() * 20;
                ball.vx += Math.cos(angle) * force;
                ball.vy += Math.sin(angle) * force;
                spawnExplosionParticles(ball.x, ball.y, ball.color, 8);
            }
        }

        function freezeAll() {
            frozen = !frozen;
            let btn = document.querySelector('[onclick="freezeAll()"]');
            if (frozen) {
                btn.style.borderColor = '#8be9fd';
                btn.style.color = '#8be9fd';
                btn.textContent = 'Unfreeze';
            } else {
                btn.style.borderColor = '#0f3460';
                btn.style.color = '#e0e0e0';
                btn.textContent = 'Freeze';
            }
        }

        function clearAll() {
            balls = [];
            walls = [];
            particles = [];
            collisionCount = 0;
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + tool).classList.add('active');

            if (tool === 'wall') {
                canvas.style.cursor = 'pointer';
            } else if (tool === 'attract' || tool === 'repel') {
                canvas.style.cursor = 'grab';
            } else {
                canvas.style.cursor = 'crosshair';
            }
        }

        // Events
        canvas.addEventListener('mousedown', (e) => {
            mouseDown = true;
            mouseX = e.clientX;
            mouseY = e.clientY - 60;

            if (currentTool === 'spawn') {
                dragStartX = mouseX;
                dragStartY = mouseY;
                isDragging = true;
            } else if (currentTool === 'wall') {
                drawingWall = true;
                wallPoints = [{ x: mouseX, y: mouseY }];
            }
        });

        canvas.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY - 60;

            if (drawingWall && mouseDown) {
                let last = wallPoints[wallPoints.length - 1];
                let dx = mouseX - last.x;
                let dy = mouseY - last.y;
                if (dx * dx + dy * dy > 100) {
                    wallPoints.push({ x: mouseX, y: mouseY });
                }
            }
        });

        canvas.addEventListener('mouseup', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY - 60;

            if (currentTool === 'spawn' && isDragging) {
                let vx = (dragStartX - mouseX) * 0.1;
                let vy = (dragStartY - mouseY) * 0.1;

                if (Math.abs(vx) < 0.5 && Math.abs(vy) < 0.5) {
                    vx = (Math.random() - 0.5) * 4;
                    vy = (Math.random() - 0.5) * 4;
                }

                if (balls.length < 300) {
                    let b = new Ball(dragStartX, dragStartY, vx, vy, ballSize);
                    balls.push(b);
                    spawnExplosionParticles(dragStartX, dragStartY, b.color, 5);
                }
            }

            if (currentTool === 'wall' && drawingWall && wallPoints.length > 1) {
                walls.push([...wallPoints]);
            }

            mouseDown = false;
            isDragging = false;
            drawingWall = false;
        });

        // Double click to spawn burst
        canvas.addEventListener('dblclick', (e) => {
            let cx = e.clientX;
            let cy = e.clientY - 60;
            for (let i = 0; i < 10; i++) {
                if (balls.length >= 300) break;
                let angle = (i / 10) * Math.PI * 2;
                let speed = 3 + Math.random() * 3;
                let b = new Ball(cx, cy, Math.cos(angle) * speed, Math.sin(angle) * speed, ballSize * (0.5 + Math.random() * 0.7));
                balls.push(b);
                spawnExplosionParticles(cx, cy, b.color, 3);
            }
        });

        // Sliders
        document.getElementById('gravity-slider').addEventListener('input', function () {
            gravity = this.value / 100;
            document.getElementById('gravity-val').textContent = gravity.toFixed(2);
        });

        document.getElementById('size-slider').addEventListener('input', function () {
            ballSize = parseInt(this.value);
            document.getElementById('size-val').textContent = ballSize;
        });

        document.getElementById('trail-check').addEventListener('change', function () {
            showTrails = this.checked;
            if (!showTrails) {
                for (let b of balls) b.trail = [];
            }
        });

        // Main loop
        function animate() {
            requestAnimationFrame(animate);

            // Background with slight fade for
            // Background with slight fade for trail effect
            if (showTrails) {
                ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
                ctx.fillRect(0, 0, W, H);
            } else {
                ctx.fillStyle = '#0a0a1a';
                ctx.fillRect(0, 0, W, H);
            }

            drawGrid();

            // Apply force fields
            if (currentTool === 'attract' && mouseDown) {
                applyForceField('attract');
            } else if (currentTool === 'repel' && mouseDown) {
                applyForceField('repel');
            }

            // Update and draw balls
            for (let ball of balls) {
                ball.update();
            }

            ballCollisions();

            for (let ball of balls) {
                ball.draw();
            }

            // Update and draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }

            drawWalls();
            drawForceField();
            drawDragLine();

            // Frozen overlay
            if (frozen) {
                ctx.fillStyle = 'rgba(139, 233, 253, 0.05)';
                ctx.fillRect(0, 0, W, H);
                ctx.fillStyle = 'rgba(139, 233, 253, 0.7)';
                ctx.font = 'bold 24px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('FROZEN', W / 2, 40);
                ctx.textAlign = 'start';
            }

            // Update stats
            frameCount++;
            let now = performance.now();
            if (now - lastFpsTime >= 500) {
                currentFps = Math.round(frameCount / ((now - lastFpsTime) / 1000));
                frameCount = 0;
                lastFpsTime = now;
            }

            document.getElementById('ball-count').textContent = balls.length;
            document.getElementById('fps-display').textContent = currentFps;
            document.getElementById('collision-count').textContent = collisionCount;
        }

        // Spawn a few starter balls
        for (let i = 0; i < 5; i++) {
            let x = W * 0.2 + Math.random() * W * 0.6;
            let y = H * 0.2 + Math.random() * H * 0.3;
            balls.push(new Ball(x, y));
        }

        animate();
    </script>
</body>
</html>
